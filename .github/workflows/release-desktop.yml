name: Build Desktop Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel: beta or formal'
        required: true
        default: beta
        type: choice
        options:
          - beta
          - formal
      tag_name:
        description: 'Optional release tag. Defaults to v<version>-beta.<run> or v<version>.'
        required: false
      release_name:
        description: 'Optional GitHub Release title.'
        required: false

jobs:
  windows:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Resolve desktop release channel
        id: channel
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' hibiki/pubspec.yaml | sed 's/version: *//;s/+.*//')
          SHORT_SHA="${GITHUB_SHA::7}"
          EVENT="${GITHUB_EVENT_NAME}"
          CHANNEL="${INPUT_CHANNEL:-}"
          TAG="${INPUT_TAG_NAME:-}"
          NAME="${INPUT_RELEASE_NAME:-}"
          BODY=""
          PRERELEASE=true
          MAKE_LATEST=false
          PUBLISH_MANAGED_RELEASE=false

          case "$EVENT" in
            workflow_dispatch)
              case "$CHANNEL" in
                beta)
                  TAG="${TAG:-v${VERSION}-beta.${GITHUB_RUN_NUMBER}}"
                  NAME="${NAME:-Hibiki ${VERSION} beta ${GITHUB_RUN_NUMBER}}"
                  BODY="Manual desktop beta/test build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Beta/test releases are prerelease and never Latest."
                  ;;
                formal)
                  TAG="${TAG:-v${VERSION}}"
                  NAME="${NAME:-Hibiki ${VERSION}}"
                  BODY="Manual desktop formal release from ${GITHUB_REF_NAME} @ ${SHORT_SHA}."
                  PRERELEASE=false
                  MAKE_LATEST=true
                  ;;
                *)
                  echo "::error title=Invalid release channel::Use beta or formal."
                  exit 1
                  ;;
              esac
              PUBLISH_MANAGED_RELEASE=true
              ;;
            release)
              CHANNEL=github-release
              TAG="${RELEASE_TAG_NAME:-${GITHUB_REF_NAME}}"
              ;;
            *)
              echo "::error title=Unsupported event::$EVENT is not a desktop release event."
              exit 1
              ;;
          esac

          {
            echo "channel=$CHANNEL"
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "prerelease=$PRERELEASE"
            echo "make_latest=$MAKE_LATEST"
            echo "publish_managed_release=$PUBLISH_MANAGED_RELEASE"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      # google_oauth_secret.dart is gitignored (the real client secret lives only
      # on dev hosts); CI lacks it, so google_drive_auth.dart's import fails to
      # compile. When the GOOGLE_OAUTH_CLIENT_SECRET repo secret is set, bake the
      # REAL value in so the desktop release can actually sign in to Google Drive
      # (otherwise sign-in hits invalid_client 401, TODO-045). When it is not
      # set, fall back to the committed example (placeholder value, no GOCSPX-
      # prefix, so the no_hardcoded_google_secret guard stays green).
      - name: Provide gitignored Google OAuth secret stub
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          dst=hibiki/lib/src/sync/google_oauth_secret.dart
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
          fi
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        shell: bash
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Build Windows release
        working-directory: hibiki
        run: flutter build windows --release
      - name: Read version
        id: ver
        shell: bash
        run: |
          V=$(grep '^version:' hibiki/pubspec.yaml | sed 's/version: *//;s/+.*//')
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y; $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          & "$iscc" "/DAppVersion=${{ steps.ver.outputs.version }}" `
            "/DSourceDir=$PWD\hibiki\build\windows\x64\runner\Release" `
            "/DOutputDir=$PWD\hibiki\build\installer" `
            "hibiki\windows\installer\hibiki.iss"
      - name: Check signing availability
        id: signcheck
        shell: bash
        env:
          CERT: ${{ secrets.WINDOWS_CERT_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then echo "have=true" >> "$GITHUB_OUTPUT"; else echo "have=false" >> "$GITHUB_OUTPUT"; fi
      - name: Sign installer (optional)
        if: steps.signcheck.outputs.have == 'true'
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$PWD\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $st = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1).FullName
          & "$st" sign /fd SHA256 /f "$PWD\cert.pfx" /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 "$PWD\hibiki\build\installer\hibiki-${{ steps.ver.outputs.version }}-windows-setup.exe"
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          files: hibiki/build/installer/hibiki-*-windows-setup.exe
      - name: Publish desktop channel release
        if: steps.channel.outputs.publish_managed_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.channel.outputs.name }}
          body: ${{ steps.channel.outputs.body }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          files: hibiki/build/installer/hibiki-*-windows-setup.exe
