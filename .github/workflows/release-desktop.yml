name: Build Desktop Release Artifacts

on:
  push:
    branches: ['main', 'develop']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel: debug, beta, or formal'
        required: true
        default: beta
        type: choice
        options:
          - debug
          - beta
          - formal
      tag_name:
        description: 'Optional release tag. Defaults to v<version>-debug.<seq>+<sha>, v<version>-beta.<seq>, or v<version>.'
        required: false
      release_name:
        description: 'Optional GitHub Release title.'
        required: false

concurrency:
  group: hibiki-release-${{ github.event.release.tag_name || github.event.inputs.tag_name || github.sha }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate unified release policy
        shell: pwsh
        run: ./tool/check_release_policy.ps1
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Resolve desktop release channel
        id: channel
        shell: bash
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' hibiki/pubspec.yaml | sed 's/version: *//;s/+.*//')
          RELEASE_SEQUENCE=$(git rev-list --count HEAD)
          if ! [[ "$RELEASE_SEQUENCE" =~ ^[0-9]+$ ]] || [ "$RELEASE_SEQUENCE" -le 0 ]; then
            echo "::error title=Invalid release sequence::Expected positive git rev-list count, got $RELEASE_SEQUENCE"
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          EVENT="${GITHUB_EVENT_NAME}"
          CHANNEL="${INPUT_CHANNEL:-}"
          TAG="${INPUT_TAG_NAME:-}"
          NAME="${INPUT_RELEASE_NAME:-}"
          BODY=""
          PRERELEASE=true
          MAKE_LATEST=false
          PUBLISH_MANAGED_RELEASE=false

          case "$EVENT" in
            push)
              CHANNEL=debug
              TAG="${TAG:-v${VERSION}-debug.${RELEASE_SEQUENCE}+${SHORT_SHA}}"
              NAME="${NAME:-Hibiki desktop debug ${VERSION} (${SHORT_SHA})}"
              BODY="Automated desktop debug-channel build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Push releases are always prerelease and never Latest."
              PUBLISH_MANAGED_RELEASE=true
              ;;
            workflow_dispatch)
              case "$CHANNEL" in
                debug)
                  TAG="${TAG:-v${VERSION}-debug.${RELEASE_SEQUENCE}+${SHORT_SHA}}"
                  NAME="${NAME:-Hibiki desktop debug ${VERSION} (${SHORT_SHA})}"
                  BODY="Manual desktop debug-channel build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Debug releases are prerelease and never Latest."
                  ;;
                beta)
                  TAG="${TAG:-v${VERSION}-beta.${RELEASE_SEQUENCE}}"
                  NAME="${NAME:-Hibiki ${VERSION} beta ${RELEASE_SEQUENCE}}"
                  BODY="Manual desktop beta/test build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Beta/test releases are prerelease and never Latest."
                  ;;
                formal)
                  TAG="${TAG:-v${VERSION}}"
                  NAME="${NAME:-Hibiki ${VERSION}}"
                  BODY="Manual desktop formal release from ${GITHUB_REF_NAME} @ ${SHORT_SHA}."
                  PRERELEASE=false
                  MAKE_LATEST=true
                  ;;
                *)
                  echo "::error title=Invalid release channel::Use debug, beta, or formal."
                  exit 1
                  ;;
              esac
              PUBLISH_MANAGED_RELEASE=true
              ;;
            release)
              CHANNEL=github-release
              TAG="${RELEASE_TAG_NAME:-${GITHUB_REF_NAME}}"
              ;;
            *)
              echo "::error title=Unsupported event::$EVENT is not a desktop release event."
              exit 1
              ;;
          esac

          BUILD_VERSION_NAME="$VERSION"
          case "$CHANNEL" in
            debug)
              if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*-debug\.[0-9]+\+[0-9A-Fa-f]{7,40}$ ]]; then
                echo "::error title=Invalid debug tag::Use v<version>-debug.<sequence>+<short-sha>, not debug-<sha>."
                exit 1
              fi
              ;;
            beta)
              if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*-beta\.[0-9]+$ ]]; then
                echo "::error title=Invalid beta tag::Use v<version>-beta.<sequence>."
                exit 1
              fi
              ;;
            formal)
              if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
                echo "::error title=Invalid formal tag::Use v<version>."
                exit 1
              fi
              ;;
          esac
          if [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*-debug\.[0-9]+\+[0-9A-Fa-f]{7,40}$ ]]; then
            BUILD_VERSION_NAME="${TAG#v}"
            BUILD_VERSION_NAME="${BUILD_VERSION_NAME%%+*}"
          fi

          {
            echo "channel=$CHANNEL"
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "prerelease=$PRERELEASE"
            echo "make_latest=$MAKE_LATEST"
            echo "publish_managed_release=$PUBLISH_MANAGED_RELEASE"
            echo "build_version_name=$BUILD_VERSION_NAME"
            echo "release_sequence=$RELEASE_SEQUENCE"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      # google_oauth_secret.dart is gitignored (the real client secret lives only
      # on dev hosts); CI lacks it, so google_drive_auth.dart's import fails to
      # compile. When the GOOGLE_OAUTH_CLIENT_SECRET repo secret is set, bake the
      # REAL value in so the desktop release can actually sign in to Google Drive
      # (otherwise sign-in hits invalid_client 401, TODO-045). When it is not
      # set, fall back to the committed example (placeholder value, no GOCSPX-
      # prefix, so the no_hardcoded_google_secret guard stays green).
      - name: Provide gitignored Google OAuth secret stub
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          dst=hibiki/lib/src/sync/google_oauth_secret.dart
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
          fi
      # log_upload_secret.dart ships a committed empty placeholder (endpoint = '')
      # so a fresh clone compiles and the log-upload button stays hidden (it is
      # gated by a non-empty endpoint, not by platform - see log_upload_config
      # showUploadLogAction). When the LOG_UPLOAD_ENDPOINT / LOG_UPLOAD_TOKEN repo
      # secrets are set, bake the real values in so CI/release builds (incl.
      # Windows) actually show and can use the "upload log to cloud" button
      # (TODO-385). When unset, leave the committed empty placeholder so the
      # button stays hidden and no endpoint is exposed.
      - name: Provide gitignored log upload secret stub
        shell: bash
        env:
          LOG_UPLOAD_ENDPOINT: ${{ secrets.LOG_UPLOAD_ENDPOINT }}
          LOG_UPLOAD_TOKEN: ${{ secrets.LOG_UPLOAD_TOKEN }}
        run: |
          dst=hibiki/lib/src/utils/misc/log_upload_secret.dart
          if [ -n "$LOG_UPLOAD_ENDPOINT" ]; then
            printf 'const String kLogUploadEndpoint = %s;\nconst String kLogUploadToken = %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["LOG_UPLOAD_ENDPOINT"]))')" \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ.get("LOG_UPLOAD_TOKEN","")))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/utils/misc/log_upload_secret.example.dart "$dst"
          fi
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        shell: bash
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Build Windows release
        working-directory: hibiki
        run: >-
          flutter build windows --release
          --build-name "${{ steps.channel.outputs.build_version_name }}"
          --build-number "${{ steps.channel.outputs.release_sequence }}"
      # ffmpeg.exe and its MinGW runtime DLLs are vendored at
      # third_party/ffmpeg-min/windows/
      # (TODO-416). It used to be fetched from another workflow's build artifact,
      # which silently broke whenever that artifact expired (90 days) or that
      # workflow had not run on this branch, shipping a Windows bundle with NO
      # ffmpeg -> missing video covers/subtitles. Copying the committed binary
      # plus its runtime DLLs makes every release self-contained and removes the
      # cross-workflow supply dependency.
      - name: Install vendored ffmpeg-min runtime into Windows bundle
        shell: pwsh
        run: |
          $sourceDir = Join-Path $PWD 'third_party\ffmpeg-min\windows'
          $targetDir = Join-Path $PWD 'hibiki\build\windows\x64\runner\Release'
          if (-not (Test-Path -LiteralPath $targetDir -PathType Container)) {
            throw "Missing Windows release bundle directory: $targetDir"
          }
          $runtimeFiles = @(
            'ffmpeg.exe',
            'libwinpthread-1.dll',
            'zlib1.dll'
          )
          foreach ($file in $runtimeFiles) {
            $source = Join-Path $sourceDir $file
            if (-not (Test-Path -LiteralPath $source -PathType Leaf)) {
              throw "Missing vendored ffmpeg-min runtime file: $source"
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $targetDir $file) -Force
          }
          Get-Item -LiteralPath ($runtimeFiles | ForEach-Object { Join-Path $targetDir $_ }) |
            Select-Object FullName, Length
      # The bundled ffmpeg -version check below is the hard gate: it proves the
      # exact binary we ship in the installer payload executes. The fuller
      # smoke-test.sh comparison additionally needs a *fixture* full ffmpeg to
      # author representative MP4/MKV inputs (the minimal bundled binary
      # deliberately lacks lavfi/muxers - see windows_vendored_ffmpeg_guard).
      # GitHub windows runners do not preinstall ffmpeg, so the fixture comes
      # from `choco install ffmpeg`, whose source community.chocolatey.org
      # intermittently returns 504 Gateway Timeout (runs +130/+132). That is an
      # external-service flake on a *reference* generator, not a defect in the
      # shipped artifact, yet it was failing the whole Desktop release workflow
      # and blocking the installer. Fix (mirrors the TODO-624 emulator
      # non-blocking precedent): retry the choco install a few times to absorb
      # transient 504s, and if the fixture still cannot be obtained, emit a loud
      # ::warning:: and skip only the comparison smoke (the bundled -version gate
      # already ran). External-platform limitation: re-evaluate once a more
      # reliable fixture ffmpeg source is vendored/cached (TODO-652).
      - name: Smoke test bundled ffmpeg in Windows bundle
        shell: pwsh
        run: |
          $target = Join-Path $PWD 'hibiki\build\windows\x64\runner\Release\ffmpeg.exe'
          if (-not (Test-Path -LiteralPath $target -PathType Leaf)) {
            throw "Missing bundled ffmpeg executable: $target"
          }
          & $target -version
          if ($LASTEXITCODE -ne 0) {
            throw "Bundled ffmpeg failed -version with exit code $LASTEXITCODE"
          }
          $fixtureCommand = Get-Command ffmpeg -ErrorAction SilentlyContinue
          if ($null -eq $fixtureCommand) {
            # External dependency: tolerate transient chocolatey 504s with a
            # bounded retry instead of failing on the first flake.
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Write-Host "Installing fixture ffmpeg from chocolatey (attempt $attempt/3)"
              choco install ffmpeg -y --no-progress
              $fixtureCommand = Get-Command ffmpeg -ErrorAction SilentlyContinue
              if ($null -ne $fixtureCommand) { break }
              if ($attempt -lt 3) {
                Write-Host "Fixture ffmpeg not available yet; retrying in 30s..."
                Start-Sleep -Seconds 30
              }
            }
          }
          if ($null -eq $fixtureCommand) {
            Write-Host "::warning title=Fixture ffmpeg unavailable::Could not obtain a full fixture ffmpeg (chocolatey likely flaking, e.g. 504). The bundled ffmpeg -version gate already passed; skipping the fixture comparison smoke test. This is an external-service flake on a reference generator, not a defect in the shipped binary (TODO-652)."
            exit 0
          }
          $fixtureFfmpeg = $fixtureCommand.Source
          & $fixtureFfmpeg -version
          if ($LASTEXITCODE -ne 0) {
            throw "Fixture ffmpeg failed -version with exit code $LASTEXITCODE"
          }
          $bash = (Get-Command bash -ErrorAction Stop).Source
          $env:FFMPEG_MIN = ($target -replace '\\', '/')
          $env:FIXTURE_FFMPEG = ($fixtureFfmpeg -replace '\\', '/')
          & $bash -c 'bash tool/ffmpeg-min/smoke-test.sh'
      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y; $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          & "$iscc" "/DAppVersion=${{ steps.channel.outputs.build_version_name }}" `
            "/DSourceDir=$PWD\hibiki\build\windows\x64\runner\Release" `
            "/DOutputDir=$PWD\hibiki\build\installer" `
            "hibiki\windows\installer\hibiki.iss"
      - name: Check signing availability
        id: signcheck
        shell: bash
        env:
          CERT: ${{ secrets.WINDOWS_CERT_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then echo "have=true" >> "$GITHUB_OUTPUT"; else echo "have=false" >> "$GITHUB_OUTPUT"; fi
      - name: Sign installer (optional)
        if: steps.signcheck.outputs.have == 'true'
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$PWD\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $st = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1).FullName
          & "$st" sign /fd SHA256 /f "$PWD\cert.pfx" /p $env:WINDOWS_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 "$PWD\hibiki\build\installer\hibiki-${{ steps.channel.outputs.build_version_name }}-windows-setup.exe"
      - name: Prepare Windows installer release asset
        shell: bash
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
          BUILD_VERSION_NAME: ${{ steps.channel.outputs.build_version_name }}
        run: |
          set -euo pipefail
          installer="hibiki/build/installer/hibiki-${BUILD_VERSION_NAME}-windows-setup.exe"
          asset_name="$(basename "$installer")"
          if [ ! -f "$installer" ]; then
            echo "::error title=Windows installer missing::Expected $installer"
            exit 1
          fi
          if [ "$CHANNEL" = "debug" ]; then
            case "$asset_name" in
              *-debug.*-windows-setup.exe) ;;
              *)
                echo "::error title=Invalid debug Windows installer asset::Expected *-debug.*-windows-setup.exe, got $asset_name"
                exit 1
                ;;
            esac
          fi
          mkdir -p hibiki/build/release-artifacts
          rm -f hibiki/build/release-artifacts/hibiki-*-windows-setup.exe
          cp "$installer" "hibiki/build/release-artifacts/$asset_name"
      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          files: hibiki/build/release-artifacts/hibiki-*-windows-setup.exe
      - name: Publish desktop channel release
        if: steps.channel.outputs.publish_managed_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.channel.outputs.name }}
          body: ${{ steps.channel.outputs.body }}
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          files: hibiki/build/release-artifacts/hibiki-*-windows-setup.exe
      # TODO-705: publish a mirror update manifest so beta/debug in-China update
      # checks succeed (raw.githubusercontent.com is proxiable; api.github.com
      # /releases is mirror-403'd, BUG-292). This pushes a DATA FILE to the
      # update-manifest branch -- it is NOT a GitHub Release: it never sets
      # make_latest / prerelease:false, reuses the channel outputs verbatim, uses
      # the shared release_sequence (never run_number), and update-manifest is
      # absent from this workflow's push trigger (main/develop only) so it does
      # not cascade a run. Merges this platform's assets into any same-tag
      # manifest the Android workflow already pushed (concurrent, dedupe by name).
      - name: Publish mirror update manifest (desktop assets)
        if: steps.channel.outputs.publish_managed_release == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
          TAG: ${{ steps.channel.outputs.tag }}
          PRERELEASE: ${{ steps.channel.outputs.prerelease }}
          NOTES: ${{ steps.channel.outputs.body }}
          VERSION: ${{ steps.channel.outputs.build_version_name }}
          RELEASE_SEQUENCE: ${{ steps.channel.outputs.release_sequence }}
          ARTIFACTS_DIR: hibiki/build/release-artifacts
          ASSET_GLOB: hibiki-*-windows-setup.exe
          PLATFORM_LABEL: desktop
        run: bash tool/publish_update_manifest.sh
