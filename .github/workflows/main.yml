name: Build Android APK
on:
  push:
    branches: ['main', 'develop']
    paths: &ci_paths
      - 'hibiki/**'
      - 'packages/**'
      - 'ci/**'
      - '.github/workflows/**'
      - 'melos.yaml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches: ['main', 'develop']
    paths: *ci_paths
  workflow_dispatch:

permissions:
  contents: read

# Cancel a superseded PR run when the PR is updated; never cancel a
# push-to-main/develop or release build mid-way (each commit's build matters
# for bisecting the previously-untested develop history).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        # TODO-414: versionCode derives from the commit count, so the validation
        # builds below need the FULL history. A shallow checkout would make
        # `git rev-list --count HEAD` report a truncated (smaller) sequence,
        # producing a versionCode that disagrees with release.yml's. Keep this in
        # lockstep with release.yml's `fetch-depth: 0`.
        fetch-depth: 0

    - name: Resolve shared release sequence
      shell: bash
      run: |
        set -euo pipefail
        RELEASE_SEQUENCE=$(git rev-list --count HEAD)
        if ! [[ "$RELEASE_SEQUENCE" =~ ^[0-9]+$ ]] || [ "$RELEASE_SEQUENCE" -le 0 ]; then
          echo "::error title=Invalid release sequence::Expected positive git rev-list count, got $RELEASE_SEQUENCE"
          exit 1
        fi
        # Same monotonic commit-count build number release.yml feeds Android, so
        # main.yml's validation APKs carry the identical versionCode formula.
        echo "RELEASE_SEQUENCE=$RELEASE_SEQUENCE" >> "$GITHUB_ENV"

    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.0'

    - name: Remove local proxy from gradle.properties
      working-directory: hibiki/android
      run: |
        sed -i '/systemProp\.http\.proxyHost/d' gradle.properties
        sed -i '/systemProp\.http\.proxyPort/d' gradle.properties
        sed -i '/systemProp\.https\.proxyHost/d' gradle.properties
        sed -i '/systemProp\.https\.proxyPort/d' gradle.properties
        sed -i '/systemProp\.http\.nonProxyHosts/d' gradle.properties

    - name: Remove aliyun mirrors from gradle files
      working-directory: hibiki/android
      run: |
        sed -i "/maven.*aliyun/d" build.gradle
        sed -i "/maven.*aliyun/d" settings.gradle

    # google_oauth_secret.dart is gitignored (the real client secret lives only
    # on dev hosts); CI lacks it, so google_drive_auth.dart's import fails
    # `flutter analyze`. When the GOOGLE_OAUTH_CLIENT_SECRET repo secret is set,
    # bake the REAL value in so release/CI builds can actually sign in to Google
    # Drive (otherwise desktop sign-in hits invalid_client 401, TODO-045). When
    # it is not set, fall back to the committed example (placeholder value, no
    # GOCSPX- prefix, so the no_hardcoded_google_secret guard stays green).
    - name: Provide gitignored Google OAuth secret stub
      shell: bash
      env:
        GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      run: |
        dst=hibiki/lib/src/sync/google_oauth_secret.dart
        if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
          printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
            "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
            > "$dst"
        elif [ ! -f "$dst" ]; then
          cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
        fi

    - name: Flutter pub get
      working-directory: hibiki
      run: flutter pub get

    - name: Apply pub cache patches
      run: |
        chmod +x ci/apply-patches.sh
        bash ci/apply-patches.sh

    - name: Run dart analyze
      working-directory: hibiki
      run: flutter analyze

    # Golden image tests are gated to the reference platform (the dev host where
    # goldens were generated); Linux CI font/raster rendering differs and would
    # always mismatch, so exclude them here. They still run on a plain local
    # `flutter test`. See hibiki/dart_test.yaml.
    - name: Run unit tests with coverage (main app)
      working-directory: hibiki
      run: dart run tool/flutter_test_failures.dart --coverage --exclude-tags golden

    - name: Run package tests
      run: |
        for pkg in packages/hibiki_core packages/hibiki_dictionary packages/hibiki_anki packages/hibiki_audio packages/hibiki_platform; do
          if [ -d "$pkg/test" ]; then
            echo "::group::Testing $pkg"
            (cd "$pkg" && dart ../../hibiki/tool/flutter_test_failures.dart --output-dir=../../.codex-test/flutter-test/$(basename "$pkg"))
            echo "::endgroup::"
          else
            echo "::warning title=No package tests::$pkg has no test/ dir — its code is only covered transitively by the main-app suite"
          fi
        done

    - name: Build debug APK
      working-directory: hibiki
      run: >-
        flutter build apk --debug
        --build-number "$RELEASE_SEQUENCE"

    - name: Prepare debug APK artifact
      if: github.event_name != 'pull_request'
      working-directory: hibiki
      shell: bash
      run: |
        set -euo pipefail
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//;s/+.*//')
        SHORT_SHA="${GITHUB_SHA::7}"
        APK_DIR=build/app/outputs/flutter-apk
        OUT_DIR=build/debug-artifacts
        APK=$(find "$APK_DIR" -maxdepth 1 -type f -name '*-debug.apk' | sort | head -n 1)
        if [ -z "$APK" ]; then
          echo "::error title=Debug APK missing::No *-debug.apk found in $APK_DIR"
          exit 1
        fi
        mkdir -p "$OUT_DIR"
        cp "$APK" "$OUT_DIR/hibiki-${VERSION}-${SHORT_SHA}-debug.apk"

    - name: Upload debug APK artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: hibiki-debug-apk-${{ github.sha }}
        path: hibiki/build/debug-artifacts/*.apk
        if-no-files-found: error
        retention-days: 14

    # TODO-741: this job builds BOTH a debug APK (uploaded above) and a release
    # APK (validation below). The self-built ffmpeg-kit native libs (~76MB per
    # ABI, x arm64 + armv7) get merged/stripped into build/app/intermediates for
    # the debug variant, leaving ~1.5GB of intermediate .so trees that the
    # release build never reuses (Gradle regenerates the release variant's own
    # merged/stripped libs). Stacking the debug intermediates under the release
    # build's native + Dart-AOT-snapshot output overran the ~14GB runner disk,
    # so the release step died with "No space left on device" / "Dart snapshot
    # generator failed exit 255" (recurring +168/+169/+170). The debug APK is
    # already captured as an artifact, so its build tree is dead weight here:
    # drop the debug build output + its leftovers before the release validation
    # runs. `|| true` keeps the step non-fatal if a path is absent on a future
    # layout change (this is housekeeping, not a gate).
    - name: Free disk before release-build validation
      shell: bash
      run: |
        echo "::group::Disk usage before cleanup"
        df -h .
        du -sh hibiki/build 2>/dev/null || true
        du -sh hibiki/build/app/intermediates 2>/dev/null || true
        echo "::endgroup::"
        # The debug APK artifact has been uploaded; its build tree
        # (intermediates + outputs) is not an input to the release build.
        rm -rf hibiki/build/app/intermediates || true
        rm -rf hibiki/build/app/outputs || true
        rm -rf hibiki/build/debug-artifacts || true
        # Drop the kotlin caches the debug build inflated; the release build
        # rebuilds what it needs.
        rm -rf hibiki/build/kotlin || true
        echo "::group::Disk usage after cleanup"
        df -h .
        du -sh hibiki/build 2>/dev/null || true
        echo "::endgroup::"

    # The release build (minify/R8/proguard + C++23 native) is the variant that
    # ships; without a keystore it was never exercised on PRs, so R8/keep-rule
    # regressions stayed invisible until a tagged release (HBK-AUDIT-026).
    # build.gradle refuses debug-signed release APKs, so we mint a throwaway
    # keystore to run the full release pipeline (artifact is NOT distributable).
    - name: Generate throwaway keystore (no signing secret present)
      if: env.HAS_KEYSTORE != 'true'
      working-directory: hibiki/android
      run: |
        keytool -genkeypair -v -keystore hibiki-release.jks \
          -storepass ci_throwaway -keypass ci_throwaway -alias ci \
          -keyalg RSA -keysize 2048 -validity 1 \
          -dname "CN=Hibiki CI, O=CI, C=US"
        cat > key.properties <<EOF
        storePassword=ci_throwaway
        keyPassword=ci_throwaway
        keyAlias=ci
        storeFile=hibiki-release.jks
        EOF
      env:
        HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    - name: Verify release build (minify/R8/proguard/native)
      if: env.HAS_KEYSTORE != 'true'
      working-directory: hibiki
      run: >-
        flutter build apk --release
        --build-number "$RELEASE_SEQUENCE"
      env:
        HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    - name: Decode keystore
      if: env.HAS_KEYSTORE == 'true'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > hibiki/android/hibiki-release.jks
      env:
        HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    - name: Create key.properties
      if: env.HAS_KEYSTORE == 'true'
      working-directory: hibiki/android
      run: |
        cat > key.properties <<EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=hibiki-release.jks
        EOF
      env:
        HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    - name: Build release APK
      if: env.HAS_KEYSTORE == 'true'
      working-directory: hibiki
      run: >-
        flutter build apk --release
        --build-number "$RELEASE_SEQUENCE"
      env:
        HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    - name: Check dependency health
      working-directory: hibiki
      run: |
        flutter pub outdated || true
