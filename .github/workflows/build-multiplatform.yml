name: Build and Test Android / macOS / Linux / Windows

# Verifies the app compiles on the four non-Android shipped platforms:
#  - iOS/macOS gamepads = GameController; Linux = evdev/GTK
#  - Windows = the forked flutter_inappwebview_windows C++ EPUB renderer, which
#    is otherwise only built on the dev host and was never gated by CI.
# Also runs the shared comprehensive automation contract on Android, Windows,
# and macOS. That runner requires real test verdict text in logs, not just a
# zero exit code.
# Runs on PRs to main/develop (so a per-platform native break blocks the merge),
# on manual dispatch, and on `ci/**` branch pushes for ad-hoc runs.
on:
  workflow_dispatch:
  push:
    branches: ['main', 'develop', 'ci/**']
    paths: &multiplatform_paths
      - 'hibiki/**'
      - 'packages/**'
      - 'ci/**'
      - 'third_party/**'
      - '.github/workflows/build-multiplatform.yml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches: ['main', 'develop']
    paths: *multiplatform_paths

# Cancel a superseded PR run (4 build jobs incl. 2 expensive macOS runners) when
# the PR is force-pushed; keep ci/** and manual-dispatch runs to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      # google_oauth_secret.dart is gitignored (the real client secret lives only
      # on dev hosts); CI lacks it, so google_drive_auth.dart's import fails to
      # compile. When the GOOGLE_OAUTH_CLIENT_SECRET repo secret is set, bake the
      # REAL value in so the build can actually sign in to Google Drive
      # (otherwise desktop sign-in hits invalid_client 401, TODO-045). When it is
      # not set, fall back to the committed example (placeholder value with no
      # GOCSPX- prefix, so the no_hardcoded_google_secret guard stays green).
      - name: Provide gitignored Google OAuth secret stub
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          dst=hibiki/lib/src/sync/google_oauth_secret.dart
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
          fi
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Run Android comprehensive automation contract
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: bash ci/comprehensive-test.sh --platform=android --only=appSmoke
      # The comprehensive runner now streams flutter-drive output to the console,
      # but also upload the full report (per-command stdout/stderr logs + report
      # .json + screenshots) so a failure is debuggable without re-running.
      - name: Upload comprehensive test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-comprehensive-report
          path: .codex-test/comprehensive/
          if-no-files-found: ignore

  # Linux gates the GTK/evdev desktop build path.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang cmake pkg-config \
            libgtk-3-dev libkeybinder-3.0-dev libmpv-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      # See the android job: bake the real OAuth secret in when the
      # GOOGLE_OAUTH_CLIENT_SECRET repo secret is set, else stub from the example
      # so the import in google_drive_auth.dart compiles (TODO-045).
      - name: Provide gitignored Google OAuth secret stub
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          dst=hibiki/lib/src/sync/google_oauth_secret.dart
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
          fi
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Build Linux (debug)
        working-directory: hibiki
        run: >-
          flutter build linux --debug

  # macOS gates the desktop build plus the shared smoke contract.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      # See the android job: bake the real OAuth secret in when the
      # GOOGLE_OAUTH_CLIENT_SECRET repo secret is set, else stub from the example
      # so the import in google_drive_auth.dart compiles (TODO-045).
      - name: Provide gitignored Google OAuth secret stub
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          dst=hibiki/lib/src/sync/google_oauth_secret.dart
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
          fi
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Build macOS (debug)
        working-directory: hibiki
        run: >-
          flutter build macos --debug
      - name: Verify macOS hoshidicts dylib bundle
        working-directory: hibiki
        run: |
          set -euo pipefail
          app_dir="build/macos/Build/Products/Debug/hibiki.app"
          dylib="$app_dir/Contents/Frameworks/libhoshidicts_ffi.dylib"
          test -f "$dylib"
          found="$(find "$app_dir/Contents/Frameworks" -maxdepth 1 -type f -name 'libhoshidicts_ffi.dylib' -print -quit)"
          test "$found" = "$dylib"
          otool -D "$dylib"
          test "$(otool -D "$dylib" | tail -n +2)" = "@rpath/libhoshidicts_ffi.dylib"
          otool -L "$dylib"
          otool -l "$app_dir/Contents/MacOS/hibiki" | grep -A2 LC_RPATH | grep -F '@executable_path/../Frameworks'
          DYLIB_PATH="$dylib" python3 - <<'PY'
          import ctypes
          import os
          lib = ctypes.CDLL(os.environ["DYLIB_PATH"])
          lib.hoshidicts_create.restype = ctypes.c_void_p
          lib.hoshidicts_destroy.argtypes = [ctypes.c_void_p]
          handle = lib.hoshidicts_create()
          if not handle:
              raise SystemExit("hoshidicts_create returned null")
          lib.hoshidicts_destroy(handle)
          print("hoshidicts dylib smoke ok")
          PY
      - name: Run macOS comprehensive automation contract
        run: bash ci/comprehensive-test.sh --platform=macos --only=appSmoke

  # TEMPORARILY DISABLED (per request): iOS runs on a macOS runner ("mac"), and
  # it was independently broken (flutter_native_splash SPM header path), so it is
  # paused too. Re-enable by removing `if: false` after fixing that and adding
  # the OAuth secret-stub step back.
  ios:
    if: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      # Unsigned DEVICE build: needs no Development Team and links the device
      # arch of all plugins (incl. gamepads_ios / record_ios). The --simulator
      # path was wrong before — record_mp3_plus shipped a device-only static lib
      # with no simulator slice; record now ships proper xcframeworks, but the
      # device no-codesign build is the meaningful headless verification.
      - name: Build iOS (debug, no codesign)
        working-directory: hibiki
        run: >-
          flutter build ios --debug --no-codesign
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      # See the android job: bake the real OAuth secret in when the
      # GOOGLE_OAUTH_CLIENT_SECRET repo secret is set, else stub from the example
      # so the import in google_drive_auth.dart compiles (TODO-045).
      - name: Provide gitignored Google OAuth secret stub
        shell: bash
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: |
          dst=hibiki/lib/src/sync/google_oauth_secret.dart
          if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
            printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
              "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
              > "$dst"
          elif [ ! -f "$dst" ]; then
            cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
          fi
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        shell: bash
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      # Windows is the ONLY platform that renders EPUB via the forked
      # flutter_inappwebview_windows C++ plugin; an MSVC/native break here was
      # previously invisible to CI (the audit: Windows never built anywhere).
      - name: Build Windows (debug)
        working-directory: hibiki
        run: >-
          flutter build windows --debug
      - name: Run Windows comprehensive automation contract
        run: .\ci\comprehensive-test.ps1 -Platform windows -Only appSmoke
