name: Build and Test Android / macOS / Linux / Windows

# Verifies the app compiles on the four non-Android shipped platforms:
#  - iOS/macOS gamepads = GameController; Linux = evdev/GTK
#  - Windows = the forked flutter_inappwebview_windows C++ EPUB renderer, which
#    is otherwise only built on the dev host and was never gated by CI.
# Also runs the shared comprehensive automation contract on Android, Windows,
# and macOS. That runner requires real test verdict text in logs, not just a
# zero exit code.
# Runs on PRs to main/develop (so a per-platform native break blocks the merge),
# on manual dispatch, and on `ci/**` branch pushes for ad-hoc runs.
on:
  workflow_dispatch:
  push:
    branches: ['main', 'develop', 'ci/**']
    paths: &multiplatform_paths
      - 'hibiki/**'
      - 'packages/**'
      - 'ci/**'
      - 'third_party/**'
      - '.github/workflows/build-multiplatform.yml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches: ['main', 'develop']
    paths: *multiplatform_paths

# Cancel a superseded PR run (4 build jobs incl. 2 expensive macOS runners) when
# the PR is force-pushed; keep ci/** and manual-dispatch runs to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Run Android comprehensive automation contract
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: bash ci/comprehensive-test.sh --platform=android --only=appSmoke

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang cmake pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Build Linux (debug)
        working-directory: hibiki
        run: >-
          flutter build linux --debug
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      - name: Build macOS (debug)
        working-directory: hibiki
        run: >-
          flutter build macos --debug
      - name: Run macOS comprehensive automation contract
        run: bash ci/comprehensive-test.sh --platform=macos --only=appSmoke

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      # Unsigned DEVICE build: needs no Development Team and links the device
      # arch of all plugins (incl. gamepads_ios / record_ios). The --simulator
      # path was wrong before — record_mp3_plus shipped a device-only static lib
      # with no simulator slice; record now ships proper xcframeworks, but the
      # device no-codesign build is the meaningful headless verification.
      - name: Build iOS (debug, no codesign)
        working-directory: hibiki
        run: >-
          flutter build ios --debug --no-codesign
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - name: Flutter pub get
        working-directory: hibiki
        run: flutter pub get
      - name: Apply pub cache patches
        shell: bash
        run: |
          chmod +x ci/apply-patches.sh
          bash ci/apply-patches.sh
      # Windows is the ONLY platform that renders EPUB via the forked
      # flutter_inappwebview_windows C++ plugin; an MSVC/native break here was
      # previously invisible to CI (the audit: Windows never built anywhere).
      - name: Build Windows (debug)
        working-directory: hibiki
        run: >-
          flutter build windows --debug
      - name: Run Windows comprehensive automation contract
        run: .\ci\comprehensive-test.ps1 -Platform windows -Only appSmoke
