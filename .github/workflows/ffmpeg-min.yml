# 构建 Hibiki 桌面用的「精简 ffmpeg」（~10MB 量级，LGPL，仅含 Hibiki 调用的组件）。
# 产物 ffmpeg(.exe) 放到 app 程序旁即被 resolveFfmpegExecutable() 优先选用
# （见 hibiki/lib/src/media/video/ffmpeg_backend.dart）。
#
# 手动触发：重新编出三平台「精简 ffmpeg」并产出 artifact。Windows 产物现已入库到
# third_party/ffmpeg-min/windows/ffmpeg.exe，release-desktop.yml 直接 Copy（不再跨
# workflow 下载 artifact，见 TODO-416）。需要刷新入库二进制时：手动跑此 workflow，
# 下载对应平台 artifact，替换 third_party 下的 vendored 文件再提交。
# configure 白名单调优清单见 docs/specs/2026-06-07-ffmpeg-min-build-pipeline.md。
name: ffmpeg-min

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: "FFmpeg git tag/branch"
        default: "n7.1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ffmpeg-min-linux-x64
          - os: macos-latest
            artifact: ffmpeg-min-macos
          - os: windows-2022
            artifact: ffmpeg-min-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg nasm yasm pkg-config zlib1g-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg nasm pkg-config

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git
            mingw-w64-x86_64-gcc mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkgconf mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ffmpeg

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: FFMPEG_REF="${{ github.event.inputs.ffmpeg_ref }}" OUT="$PWD/out" bash tool/ffmpeg-min/build-ffmpeg-min.sh

      - name: Build (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: FFMPEG_REF="${{ github.event.inputs.ffmpeg_ref }}" OUT="$PWD/out" bash tool/ffmpeg-min/build-ffmpeg-min.sh

      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: FFMPEG_MIN="$PWD/out/bin/ffmpeg" bash tool/ffmpeg-min/smoke-test.sh

      - name: Smoke test (Windows / MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: FFMPEG_MIN="$PWD/out/bin/ffmpeg.exe" bash tool/ffmpeg-min/smoke-test.sh

      - name: Report size (Linux/macOS)
        if: runner.os != 'Windows'
        run: ls -lh out/bin/ffmpeg

      - name: Report size (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-Item out/bin/ffmpeg.exe | Select-Object Name, Length

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/bin/ffmpeg
            out/bin/ffmpeg.exe
          if-no-files-found: error
