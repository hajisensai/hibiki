name: Build Release APK

on:
  push:
    branches: ['main', 'develop']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel: debug, beta, or formal'
        required: true
        default: beta
        type: choice
        options:
          - debug
          - beta
          - formal
      tag_name:
        description: 'Optional release tag. Defaults to v<version>-debug.<seq>+<sha>, v<version>-beta.<seq>, or v<version>.'
        required: false
      release_name:
        description: 'Optional GitHub Release title.'
        required: false

concurrency:
  group: hibiki-release-${{ github.event.release.tag_name || github.event.inputs.tag_name || github.sha }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Validate unified release policy
      shell: pwsh
      run: ./tool/check_release_policy.ps1

    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.0'

    - name: Resolve Android release channel
      id: channel
      working-directory: hibiki
      shell: bash
      env:
        INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
        INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name }}
        RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      run: |
        set -euo pipefail
        PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
        VERSION="${PUBSPEC_VERSION%%+*}"
        PUBSPEC_BUILD="${PUBSPEC_VERSION#*+}"
        if [ "$PUBSPEC_BUILD" = "$PUBSPEC_VERSION" ]; then
          PUBSPEC_BUILD=1
        fi
        if ! [[ "$PUBSPEC_BUILD" =~ ^[0-9]+$ ]]; then
          echo "::error title=Invalid pubspec build number::Expected numeric +build in $PUBSPEC_VERSION"
          exit 1
        fi
        RELEASE_SEQUENCE=$(git rev-list --count HEAD)
        if ! [[ "$RELEASE_SEQUENCE" =~ ^[0-9]+$ ]] || [ "$RELEASE_SEQUENCE" -le 0 ]; then
          echo "::error title=Invalid release sequence::Expected positive git rev-list count, got $RELEASE_SEQUENCE"
          exit 1
        fi
        # TODO-414: Android versionCode = build.gradle's versionCodeBase (1e9, a
        # one-time migration floor above every historically-shipped versionCode)
        # + 100 * RELEASE_SEQUENCE + ABI offset. The build number passed here is
        # JUST the monotonic commit count, NOT PUBSPEC_BUILD * 1e6 + seq: the
        # old *1e6 formula produced versionCode ~6.6e9, which overflows int32 and
        # exceeds Android's 2.1e9 ceiling, so beta/release Android packages could
        # not be built at all. PUBSPEC_BUILD stays parsed for logging only.
        echo "PUBSPEC_BUILD (log only, not in versionCode): $PUBSPEC_BUILD"
        ANDROID_BUILD_NUMBER=$RELEASE_SEQUENCE
        SHORT_SHA="${GITHUB_SHA::7}"
        EVENT="${GITHUB_EVENT_NAME}"
        CHANNEL="${INPUT_CHANNEL:-}"
        TAG="${INPUT_TAG_NAME:-}"
        NAME="${INPUT_RELEASE_NAME:-}"
        BODY=""
        PRERELEASE=true
        MAKE_LATEST=false
        FILES="hibiki/build/release-artifacts/*-debug.apk"
        BUILD_DEBUG_APK=true
        BUILD_DEBUG_CHANNEL_APK=false
        BUILD_SPLIT_RELEASE_APK=false
        NEEDS_RELEASE_KEYSTORE=false
        PUBLISH_MANAGED_RELEASE=false

        case "$EVENT" in
          push)
            CHANNEL=debug
            TAG="${TAG:-v${VERSION}-debug.${RELEASE_SEQUENCE}+${SHORT_SHA}}"
            NAME="${NAME:-Hibiki debug ${VERSION} (${SHORT_SHA})}"
            BODY="Automated release-signed debug-channel build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Push releases are always prerelease and never Latest."
            BUILD_DEBUG_APK=false
            BUILD_DEBUG_CHANNEL_APK=true
            NEEDS_RELEASE_KEYSTORE=true
            PUBLISH_MANAGED_RELEASE=true
            ;;
          workflow_dispatch)
            case "$CHANNEL" in
              debug)
                TAG="${TAG:-v${VERSION}-debug.${RELEASE_SEQUENCE}+${SHORT_SHA}}"
                NAME="${NAME:-Hibiki debug ${VERSION} (${SHORT_SHA})}"
                BODY="Manual release-signed debug-channel build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Debug releases are prerelease and never Latest."
                BUILD_DEBUG_APK=false
                BUILD_DEBUG_CHANNEL_APK=true
                NEEDS_RELEASE_KEYSTORE=true
                ;;
              beta)
                TAG="${TAG:-v${VERSION}-beta.${RELEASE_SEQUENCE}}"
                NAME="${NAME:-Hibiki ${VERSION} beta ${RELEASE_SEQUENCE}}"
                BODY="Manual beta/test build from ${GITHUB_REF_NAME} @ ${SHORT_SHA}. Beta/test releases are prerelease and never Latest."
                FILES="hibiki/build/release-artifacts/hibiki-*.apk"
                BUILD_DEBUG_APK=false
                BUILD_SPLIT_RELEASE_APK=true
                NEEDS_RELEASE_KEYSTORE=true
                ;;
              formal)
                TAG="${TAG:-v${VERSION}}"
                NAME="${NAME:-Hibiki ${VERSION}}"
                BODY="Manual formal release from ${GITHUB_REF_NAME} @ ${SHORT_SHA}."
                PRERELEASE=false
                MAKE_LATEST=true
                FILES="hibiki/build/release-artifacts/hibiki-*.apk"
                BUILD_DEBUG_APK=false
                BUILD_SPLIT_RELEASE_APK=true
                NEEDS_RELEASE_KEYSTORE=true
                ;;
              *)
                echo "::error title=Invalid release channel::Use debug, beta, or formal."
                exit 1
                ;;
            esac
            PUBLISH_MANAGED_RELEASE=true
            ;;
          release)
            CHANNEL=github-release
            TAG="${RELEASE_TAG_NAME:-${GITHUB_REF_NAME}}"
            FILES="hibiki/build/release-artifacts/hibiki-*.apk"
            BUILD_SPLIT_RELEASE_APK=true
            NEEDS_RELEASE_KEYSTORE=true
            ;;
          *)
            echo "::error title=Unsupported event::$EVENT is not a release channel event."
            exit 1
            ;;
        esac

        BUILD_VERSION_NAME="${TAG#v}"
        BUILD_VERSION_NAME="${BUILD_VERSION_NAME%%+*}"
        case "$CHANNEL" in
          debug)
            if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*-debug\.[0-9]+\+[0-9A-Fa-f]{7,40}$ ]]; then
              echo "::error title=Invalid debug tag::Use v<version>-debug.<sequence>+<short-sha>, not debug-<sha>."
              exit 1
            fi
            ;;
          beta)
            if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*-beta\.[0-9]+$ ]]; then
              echo "::error title=Invalid beta tag::Use v<version>-beta.<sequence>."
              exit 1
            fi
            ;;
          formal)
            if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
              echo "::error title=Invalid formal tag::Use v<version>."
              exit 1
            fi
            ;;
        esac

        {
          echo "channel=$CHANNEL"
          echo "tag=$TAG"
          echo "name=$NAME"
          echo "prerelease=$PRERELEASE"
          echo "make_latest=$MAKE_LATEST"
          echo "build_debug_apk=$BUILD_DEBUG_APK"
          echo "build_debug_channel_apk=$BUILD_DEBUG_CHANNEL_APK"
          echo "build_split_release_apk=$BUILD_SPLIT_RELEASE_APK"
          echo "needs_release_keystore=$NEEDS_RELEASE_KEYSTORE"
          echo "build_version_name=$BUILD_VERSION_NAME"
          echo "android_build_number=$ANDROID_BUILD_NUMBER"
          echo "release_sequence=$RELEASE_SEQUENCE"
          echo "publish_managed_release=$PUBLISH_MANAGED_RELEASE"
          echo "files=$FILES"
          echo "body<<EOF"
          echo "$BODY"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Decode keystore
      if: steps.channel.outputs.needs_release_keystore == 'true'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > hibiki/android/hibiki-release.jks

    - name: Create key.properties
      if: steps.channel.outputs.needs_release_keystore == 'true'
      working-directory: hibiki/android
      run: |
        cat > key.properties <<EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=hibiki-release.jks
        EOF

    - name: Remove local proxy from gradle.properties
      working-directory: hibiki/android
      run: |
        sed -i '/systemProp\.http\.proxyHost/d' gradle.properties
        sed -i '/systemProp\.http\.proxyPort/d' gradle.properties
        sed -i '/systemProp\.https\.proxyHost/d' gradle.properties
        sed -i '/systemProp\.https\.proxyPort/d' gradle.properties
        sed -i '/systemProp\.http\.nonProxyHosts/d' gradle.properties

    - name: Remove aliyun mirrors from gradle files
      working-directory: hibiki/android
      run: |
        sed -i "/maven.*aliyun/d" build.gradle
        sed -i "/maven.*aliyun/d" settings.gradle

    # google_oauth_secret.dart is gitignored (the real client secret lives only
    # on dev hosts); CI lacks it, so google_drive_auth.dart's import fails
    # `flutter analyze`. When the GOOGLE_OAUTH_CLIENT_SECRET repo secret is set,
    # bake the REAL value in so release/CI builds can actually sign in to Google
    # Drive (otherwise desktop sign-in hits invalid_client 401, TODO-045). When
    # it is not set, fall back to the committed example (placeholder value, no
    # GOCSPX- prefix, so the no_hardcoded_google_secret guard stays green).
    - name: Provide gitignored Google OAuth secret stub
      shell: bash
      env:
        GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      run: |
        dst=hibiki/lib/src/sync/google_oauth_secret.dart
        if [ -n "$GOOGLE_OAUTH_CLIENT_SECRET" ]; then
          printf 'const String kGoogleOAuthClientSecret =\n    %s;\n' \
            "$(python3 -c 'import json,os; print(json.dumps(os.environ["GOOGLE_OAUTH_CLIENT_SECRET"]))')" \
            > "$dst"
        elif [ ! -f "$dst" ]; then
          cp hibiki/lib/src/sync/google_oauth_secret.example.dart "$dst"
        fi
    # log_upload_secret.dart ships a committed empty placeholder (endpoint = '')
    # so a fresh clone compiles and the log-upload button stays hidden (it is
    # gated by a non-empty endpoint, not by platform - see log_upload_config
    # showUploadLogAction). When the LOG_UPLOAD_ENDPOINT / LOG_UPLOAD_TOKEN repo
    # secrets are set, bake the real values in so CI/release builds (incl.
    # Windows) actually show and can use the "upload log to cloud" button
    # (TODO-385). When unset, leave the committed empty placeholder so the
    # button stays hidden and no endpoint is exposed.
    - name: Provide gitignored log upload secret stub
      shell: bash
      env:
        LOG_UPLOAD_ENDPOINT: ${{ secrets.LOG_UPLOAD_ENDPOINT }}
        LOG_UPLOAD_TOKEN: ${{ secrets.LOG_UPLOAD_TOKEN }}
      run: |
        dst=hibiki/lib/src/utils/misc/log_upload_secret.dart
        if [ -n "$LOG_UPLOAD_ENDPOINT" ]; then
          printf 'const String kLogUploadEndpoint = %s;\nconst String kLogUploadToken = %s;\n' \
            "$(python3 -c 'import json,os; print(json.dumps(os.environ["LOG_UPLOAD_ENDPOINT"]))')" \
            "$(python3 -c 'import json,os; print(json.dumps(os.environ.get("LOG_UPLOAD_TOKEN","")))')" \
            > "$dst"
        elif [ ! -f "$dst" ]; then
          cp hibiki/lib/src/utils/misc/log_upload_secret.example.dart "$dst"
        fi

    - name: Flutter pub get
      working-directory: hibiki
      run: flutter pub get

    - name: Apply pub cache patches
      run: |
        chmod +x ci/apply-patches.sh
        bash ci/apply-patches.sh

    - name: Run dart analyze
      working-directory: hibiki
      run: flutter analyze

    - name: Run unit tests (main app)
      working-directory: hibiki
      run: dart run tool/flutter_test_failures.dart --exclude-tags golden

    - name: Run package tests
      run: |
        for pkg in packages/hibiki_core packages/hibiki_dictionary packages/hibiki_anki packages/hibiki_audio packages/hibiki_platform; do
          if [ -d "$pkg/test" ]; then
            echo "::group::Testing $pkg"
            (cd "$pkg" && dart ../../hibiki/tool/flutter_test_failures.dart --output-dir=../../.codex-test/flutter-test/$(basename "$pkg"))
            echo "::endgroup::"
          else
            echo "::warning title=No package tests::$pkg has no test/ dir — its code is only covered transitively by the main-app suite"
          fi
        done

    - name: Collect Android release build diagnostics
      if: ${{ steps.channel.outputs.build_debug_apk == 'true' || steps.channel.outputs.build_debug_channel_apk == 'true' || steps.channel.outputs.build_split_release_apk == 'true' }}
      working-directory: hibiki
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Tool versions"
        pwd
        git rev-parse --short HEAD
        flutter --version
        dart --version
        java -version
        (cd android && timeout 120s ./gradlew --version --no-daemon) || true
        echo "::endgroup::"
        echo "::group::Pre-build output paths"
        ls -la build || true
        ls -la build/app || true
        ls -la build/app/outputs || true
        ls -la build/app/outputs/flutter-apk || true
        find build/app/outputs/flutter-apk -maxdepth 1 -type f -name '*.apk' -print -exec ls -lh {} \; || true
        echo "::endgroup::"

    - name: Build debug APK
      if: steps.channel.outputs.build_debug_apk == 'true'
      working-directory: hibiki
      timeout-minutes: 20
      shell: bash
      run: |
        set -euo pipefail
        flutter --verbose build apk --debug \
          --build-name "${{ steps.channel.outputs.build_version_name }}" \
          --build-number "${{ steps.channel.outputs.android_build_number }}"

    - name: Prepare debug APK release asset
      if: steps.channel.outputs.build_debug_apk == 'true'
      working-directory: hibiki
      shell: bash
      run: |
        set -euo pipefail
        BUILD_VERSION_NAME="${{ steps.channel.outputs.build_version_name }}"
        SHORT_SHA="${GITHUB_SHA::7}"
        APK_DIR=build/app/outputs/flutter-apk
        OUT_DIR=build/release-artifacts
        DEBUG_APK=$(find "$APK_DIR" -maxdepth 1 -type f -name '*-debug.apk' | sort | head -n 1)
        if [ -z "$DEBUG_APK" ]; then
          echo "::error title=Debug APK missing::No *-debug.apk found in $APK_DIR"
          exit 1
        fi
        mkdir -p "$OUT_DIR"
        rm -f "$OUT_DIR"/hibiki-*.apk
        cp "$DEBUG_APK" "$OUT_DIR/hibiki-${BUILD_VERSION_NAME}-${SHORT_SHA}-debug.apk"

    - name: Build release-signed debug-channel APK
      if: steps.channel.outputs.build_debug_channel_apk == 'true'
      working-directory: hibiki
      timeout-minutes: 30
      shell: bash
      run: |
        set -euo pipefail
        flutter --verbose build apk --release --target-platform android-arm64 \
          --build-name "${{ steps.channel.outputs.build_version_name }}" \
          --build-number "${{ steps.channel.outputs.android_build_number }}"

    - name: Prepare release-signed debug-channel APK asset
      if: steps.channel.outputs.build_debug_channel_apk == 'true'
      working-directory: hibiki
      shell: bash
      run: |
        set -euo pipefail
        BUILD_VERSION_NAME="${{ steps.channel.outputs.build_version_name }}"
        SHORT_SHA="${GITHUB_SHA::7}"
        APK_DIR=build/app/outputs/flutter-apk
        OUT_DIR=build/release-artifacts
        DEBUG_CHANNEL_APK=$(find "$APK_DIR" -maxdepth 1 -type f -name '*.apk' ! -name '*-debug.apk' | sort | head -n 1)
        if [ -z "$DEBUG_CHANNEL_APK" ]; then
          echo "::error title=Debug channel APK missing::No release-signed APK found in $APK_DIR"
          exit 1
        fi
        mkdir -p "$OUT_DIR"
        rm -f "$OUT_DIR"/hibiki-*.apk
        cp "$DEBUG_CHANNEL_APK" "$OUT_DIR/hibiki-${BUILD_VERSION_NAME}-${SHORT_SHA}-debug.apk"

    - name: Build release APK (split per ABI)
      if: steps.channel.outputs.build_split_release_apk == 'true'
      working-directory: hibiki
      timeout-minutes: 60
      shell: bash
      run: |
        set -euo pipefail
        flutter --verbose build apk --split-per-abi --release \
          --build-name "${{ steps.channel.outputs.build_version_name }}" \
          --build-number "${{ steps.channel.outputs.android_build_number }}"

    - name: Collect Android post-build diagnostics
      if: ${{ always() && (steps.channel.outputs.build_debug_apk == 'true' || steps.channel.outputs.build_debug_channel_apk == 'true' || steps.channel.outputs.build_split_release_apk == 'true') }}
      working-directory: hibiki
      shell: bash
      run: |
        set -euo pipefail
        echo "::group::Post-build APK diagnostics"
        pwd
        find build/app/outputs/flutter-apk -maxdepth 1 -type f -name '*.apk' -print -exec ls -lh {} \; || true
        find build/app/outputs -maxdepth 5 -type f \( -name '*.apk' -o -name '*.aab' \) -print || true
        echo "::endgroup::"

    - name: Prepare release APK assets
      if: steps.channel.outputs.build_split_release_apk == 'true'
      working-directory: hibiki
      shell: bash
      run: |
        set -euo pipefail
        BUILD_VERSION_NAME="${{ steps.channel.outputs.build_version_name }}"
        APK_DIR=build/app/outputs/flutter-apk
        OUT_DIR=build/release-artifacts
        mkdir -p "$OUT_DIR"
        for f in "$APK_DIR"/app-*-release.apk; do
          ABI=$(basename "$f" | sed 's/^app-//;s/-release\.apk$//')
          cp "$f" "$OUT_DIR/hibiki-${BUILD_VERSION_NAME}-${ABI}.apk"
        done

    # TODO-866: the prepared APKs in build/release-artifacts/ are otherwise only
    # ever uploaded as GitHub Release assets (the softprops steps below). When
    # that release publish intermittently 403s ("Resource not accessible by
    # integration"), the APK is built successfully but has NO download path and
    # is destroyed with the runner. Capture it as a workflow-run artifact so the
    # build is always downloadable from the run page, decoupled from Release
    # publish. Pure additive capture: touches no tag/publish/Latest/formal
    # logic. always() + no channel gate so a successful build is downloadable
    # even if a later publish step 403s; if-no-files-found: ignore tolerates
    # channels/events that produced no APK.
    - name: Upload APK artifacts to workflow run
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: hibiki-${{ steps.channel.outputs.channel }}-apk-${{ github.sha }}
        path: hibiki/build/release-artifacts/*.apk
        if-no-files-found: ignore
        retention-days: 14

    - name: Upload APKs to GitHub Release event
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.channel.outputs.tag }}
        files: |
          hibiki/build/release-artifacts/hibiki-*.apk

    - name: Publish Android channel release
      if: steps.channel.outputs.publish_managed_release == 'true'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.channel.outputs.tag }}
        target_commitish: ${{ github.sha }}
        name: ${{ steps.channel.outputs.name }}
        body: ${{ steps.channel.outputs.body }}
        prerelease: ${{ steps.channel.outputs.prerelease }}
        make_latest: ${{ steps.channel.outputs.make_latest }}
        files: ${{ steps.channel.outputs.files }}
    # TODO-705: publish a mirror update manifest so beta/debug in-China update
    # checks succeed (raw.githubusercontent.com is proxiable; api.github.com
    # /releases is mirror-403'd, BUG-292). This pushes a DATA FILE to the
    # update-manifest branch -- it is NOT a GitHub Release: it never sets
    # make_latest / prerelease:false, reuses the channel outputs verbatim, uses
    # the shared release_sequence (never run_number), and update-manifest is
    # absent from this workflow's push trigger (main/develop only) so it does
    # not cascade a run.
    - name: Publish mirror update manifest (Android assets)
      if: steps.channel.outputs.publish_managed_release == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
        CHANNEL: ${{ steps.channel.outputs.channel }}
        TAG: ${{ steps.channel.outputs.tag }}
        PRERELEASE: ${{ steps.channel.outputs.prerelease }}
        NOTES: ${{ steps.channel.outputs.body }}
        VERSION: ${{ steps.channel.outputs.build_version_name }}
        RELEASE_SEQUENCE: ${{ steps.channel.outputs.release_sequence }}
        ARTIFACTS_DIR: hibiki/build/release-artifacts
        ASSET_GLOB: hibiki-*.apk
        PLATFORM_LABEL: android
      run: bash tool/publish_update_manifest.sh
