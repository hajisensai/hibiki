import java.io.File
import java.nio.file.Files
import java.security.MessageDigest

group 'com.alexmercerind.media_kit_libs_android_video'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.library'

android {
    // Conditional for compatibility with AGP <4.2.
    if (project.android.hasProperty("namespace")) {
        namespace 'com.alexmercerind.media_kit_libs_android_video'
    }

    compileSdkVersion 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdkVersion 16
    }

    dependencies {
        implementation fileTree(dir: "$buildDir/output", include: "*.jar")
    }
}

task downloadDependencies(type: Exec) {   
        // Delete previously created /output subdirectory.

        def outputDir = file("$buildDir/output")
        if (outputDir.exists()) {
            outputDir.deleteDir()
        }
        outputDir.mkdirs()

        // Download all *.jar dependencies & verify their MD5 checksums.
        //
        // HIBIKI FORK (BUG-073): upstream pins v1.1.7 `default-*.jar`. The
        // media-kit "default" FFmpeg flavor compiles `--enable-demuxer=truehd`
        // but NOT `--enable-decoder=truehd/mlp`, so TrueHD audio demuxes but
        // never decodes — silent, the same root cause proven on Windows. The
        // "full" flavor (`buildscripts/flavors/full.sh` = `--enable-decoders`)
        // includes every decoder incl. TrueHD/MLP. v1.1.7 had no full jars;
        // v1.1.11 (2026-01) ships `full-<abi>.jar` for all 4 ABIs. Repoint to
        // them (full .so is ~4MB larger — the extra decoders). MD5s recomputed
        // from the downloaded full jars.
        def filesToDownload = [
            ["url": "https://github.com/media-kit/libmpv-android-video-build/releases/download/v1.1.11/full-arm64-v8a.jar", "md5": "86f2c8faeb66af1878b3a16f67831cb3", "destination": file("$buildDir/v1.1.11/full-arm64-v8a.jar")],
            ["url": "https://github.com/media-kit/libmpv-android-video-build/releases/download/v1.1.11/full-armeabi-v7a.jar", "md5": "93542d40e44f3afad3aa773674e8eaa5", "destination": file("$buildDir/v1.1.11/full-armeabi-v7a.jar")],
            ["url": "https://github.com/media-kit/libmpv-android-video-build/releases/download/v1.1.11/full-x86_64.jar", "md5": "44b7efdbaf3626d6b24afaf5d497a369", "destination": file("$buildDir/v1.1.11/full-x86_64.jar")],
            ["url": "https://github.com/media-kit/libmpv-android-video-build/releases/download/v1.1.11/full-x86.jar", "md5": "e69a9bbd7fb587deb33dd10fecc2fecc", "destination": file("$buildDir/v1.1.11/full-x86.jar")]
        ]

        filesToDownload.each { fileInfo ->
            def destFile = fileInfo.destination
            if (destFile.exists()) {
                def calculatedMD5 = MessageDigest.getInstance("MD5").digest(Files.readAllBytes(destFile.toPath())).encodeHex().toString()

                if (calculatedMD5 != fileInfo.md5) {
                    destFile.delete()
                    println "MD5 mismatch. File deleted: ${destFile}"
                }

            }

            if (!destFile.exists()) {
                destFile.parentFile.mkdirs()
                println "Downloading file from: ${fileInfo.url}"
                destFile.withOutputStream { os ->
                    os << new URL(fileInfo.url).openStream()
                }

                def calculatedMD5 = MessageDigest.getInstance("MD5").digest(Files.readAllBytes(destFile.toPath())).encodeHex().toString()
                if (calculatedMD5 != fileInfo.md5) {
                    throw new GradleException("MD5 verification failed for ${destFile}")
                }
            }

            copy {
                from destFile
                into outputDir
            }
        }
}

assemble.dependsOn(downloadDependencies)