name: hibiki_workspace
repository: https://github.com/hajisensai/hibiki

packages:
  - packages/*
  - hibiki

command:
  bootstrap:
    usePubspecOverrides: true
    # After `melos bootstrap` resolves deps, finish the fresh-checkout setup so
    # the workspace is build-ready in one command: apply the non-vendored
    # pub-cache patches. Requires bash (Git Bash on Windows). The Windows-native
    # path is tool/bootstrap.ps1 (melos bootstrap has a CJK encoding bug on Windows).
    hooks:
      post: |
        bash ci/apply-patches.sh

scripts:
  analyze:
    run: melos exec -- "dart analyze --fatal-infos"
    description: Run dart analyze in all packages

  test:
    run: melos exec -- "flutter test"
    description: Run tests in all packages

  dev:
    run: |
      cd hibiki && flutter run
    description: Run Hibiki in debug mode

  build:android:
    run: |
      cd hibiki && flutter build apk --release --target-platform android-arm64 --split-per-abi
    description: Build Android release APK
