<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>
<h3>Hibiki Reader Bridge</h3>
<p style="max-width:32em;color:#555;font-size:13px">
  These are auto-configured by Hibiki's install helper. Leave a field blank to
  use the auto-configured default shown as a placeholder; only fill a field to
  override it.
</p>
<label>Host <input id="host"></label><br>
<label>Port <input id="port" type="number"></label><br>
<label>Token <input id="token"></label><br>
<button id="save">Save</button>
<button id="reset" type="button">Reset to auto</button>
<span id="status"></span>
<script src="hibiki-defaults.js"></script>
<script src="options.js"></script></body></html>
