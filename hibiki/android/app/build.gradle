plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// TODO-414: one-time migration floor for the Android versionCode. The CI build
// number (--build-number) is the monotonic `git rev-list --count HEAD` commit
// count (see release.yml / main.yml). The shipped versionCode is
//   versionCodeBase + 100 * versionCode + abiOffset
// 1_000_000_000 sits safely above every historically-shipped versionCode
// (the highest ever installed was ~6603) yet leaves ~10.9M commits of headroom
// before the int32 / Android 2.1e9 ceiling, so no user has to uninstall. The
// old `PUBSPEC_BUILD * 1_000_000 + seq` CI formula produced versionCode ~6.6e9,
// which overflowed int32 and exceeded Android's 2.1e9 limit, so beta/release
// Android packages could not be built. The maxVersionCode assertion in
// applicationVariants below fails the build loudly if it ever nears the ceiling.
def versionCodeBase = 1000000000
def maxVersionCode = 2100000000

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def requireReleaseKeystore = {
    if (!keystorePropertiesFile.exists()) {
        throw new GradleException("Release signing requires android/key.properties; refusing to build a debug-signed release APK.")
    }
    ["keyAlias", "keyPassword", "storeFile", "storePassword"].each { key ->
        if (!keystoreProperties[key]) {
            throw new GradleException("Release signing property '${key}' is missing in android/key.properties.")
        }
    }
    def releaseStoreFile = file("${rootProject.projectDir}/${keystoreProperties['storeFile']}")
    if (!releaseStoreFile.exists()) {
        throw new GradleException("Release signing storeFile '${keystoreProperties['storeFile']}' does not exist.")
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.allTasks.any { it.name.toLowerCase().contains("release") }) {
        requireReleaseKeystore()
    }
}

android {
    namespace "app.hibiki.reader"
    compileSdk 36
    ndkVersion '27.0.12077973'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "app.hibiki.reader"
        minSdkVersion 24
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++23"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        ndk {
            // abiFilters omitted: --split-per-abi in CI controls ABI splits;
            // fat APK includes all ABIs by default
        }
    }

    externalNativeBuild {
        cmake {
            path "../../../native/hoshidicts/CMakeLists.txt"
            version "3.22.1"
        }
    }

    buildFeatures {
        buildConfig true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file("${rootProject.projectDir}/${keystoreProperties['storeFile']}")
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
        }
    }

    packagingOptions {
        pickFirst 'lib/**/libc++_shared.so'
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def appName = "hibiki"
            def buildType = variant.buildType.name
            def architecture = output.getFilter(com.android.build.OutputFile.ABI)
            def newName

            if ("${architecture}" == "arm64-v8a") {
                architecture = "arm64"
            } else if ("${architecture}" == "armeabi-v7a") {
                architecture = "armeabi"
            }

            if ("${architecture}" == "null") {
                if (buildType == 'debug') {
                    newName = "${appName}_${defaultConfig.versionName}-debug.apk"
                } else {
                    newName = "${appName}_${defaultConfig.versionName}.apk"
                }
                // HBK-AUDIT-071: the fat-APK branch computed newName but never
                // applied it, so the fat APK kept the default app-<type>.apk
                // name. Assign it like the split-ABI branch does.
                outputFileName = newName
                def computed = versionCodeBase + (100 * project.android.defaultConfig.versionCode)
                if (computed > maxVersionCode) {
                    throw new GradleException("Android versionCode ${computed} exceeds the ${maxVersionCode} ceiling (int32 / Android limit). Reduce versionCodeBase or the build number; see TODO-414.")
                }
                output.versionCodeOverride = computed
            } else {
                if (buildType == 'debug') {
                    newName = "${appName}_${defaultConfig.versionName}-${architecture}-debug.apk"
                } else {
                    newName = "${appName}_${defaultConfig.versionName}-${architecture}.apk"
                }

                def offset
                if (architecture == "armeabi") {
                    offset = 1
                } else if (architecture == "arm64") {
                    offset = 2
                } else if (architecture == "x86_64") {
                    offset = 3
                }

                outputFileName = newName
                def computed = versionCodeBase + (100 * project.android.defaultConfig.versionCode) + offset
                if (computed > maxVersionCode) {
                    throw new GradleException("Android versionCode ${computed} exceeds the ${maxVersionCode} ceiling (int32 / Android limit). Reduce versionCodeBase or the build number; see TODO-414.")
                }
                output.versionCodeOverride = computed
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.2.20"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'com.github.ankidroid:Anki-Android:2.17alpha14'
    implementation 'com.github.umair13adil:RxLogs:v1.0.18'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'androidx.media3:media3-transformer:1.10.0'
}
