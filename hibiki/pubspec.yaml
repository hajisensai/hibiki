dependency_overrides:
  # 自编 ffmpeg-kit（arthenica 源码重编，android 用 third_party 内自编 AAR；修 BUG-122
  # Android16 启动崩溃）。Dart API 与上游 ffmpeg_kit_flutter 6.0.3 一致。
  ffmpeg_kit_flutter:
    path: ../third_party/ffmpeg_kit_flutter
  flutter_inappwebview_windows:
    path: ../packages/flutter_inappwebview_windows
  # flutter_inappwebview_android 1.1.3 has legacy openFileChooser overloads
  # declared protected, which fails against the current Android WebChromeClient
  # API at compileSdk 36. Keep the Android implementation vendored until an
  # upstream release carries the public-method fix.
  flutter_inappwebview_android:
    path: ../third_party/flutter_inappwebview_android
  # Android uses the engine's native key-event path for controllers, NOT the
  # gamepads plugin. The real gamepads_android crashes at launch (it casts
  # MainActivity to GamepadsCompatibleActivity unconditionally), so override it
  # with a Dart-only no-op so no native ActivityAware plugin is registered.
  gamepads_android:
    path: ../packages/gamepads_android_stub
  # BUG-116: the pub plugin gamepads_windows 0.3.0+1 crashes — its polling
  # thread is detached and keeps calling GetCurrentReading on g_gameInput AFTER
  # stop() Releases it (teardown use-after-free at FlutterDesktopViewController
  # Destroy), emits events by calling the Flutter MethodChannel directly off the
  # polling thread (channel must be platform-thread only), races on plain-bool
  # flags, and registers its device callback through an uninitialized wild
  # pointer. Vendored fork fixes all four (join-then-release threads, marshal
  # events to the platform thread via a message-only window, atomic flags,
  # value-typed callback token). Keep until upstream carries the fix.
  gamepads_windows:
    path: ../packages/gamepads_windows
  # Vendored third-party packages carrying Flutter 3.x API-compat patches that
  # are not published on pub.dev. Previously these lived only as hand-edits in
  # each dev's pub-cache, so a clean checkout failed to build (e.g. on iOS):
  #   network_to_file_image: hashValues→Object.hash, DecoderCallback /
  #     PaintingBinding.instantiateImageCodec / ImageProvider.load removals.
  #   carousel_slider: CarouselController name clash with flutter/material.
  #   fading_edge_scrollview: PageController vs ScrollController type.
  # Source under third_party/ (SDK upper bound bumped to <4.0.0 for Dart 3).
  network_to_file_image:
    path: ../third_party/network_to_file_image
  carousel_slider:
    path: ../third_party/carousel_slider
  fading_edge_scrollview:
    path: ../third_party/fading_edge_scrollview
  # BUG-073: upstream media_kit_libs_windows_video 1.0.11 pins a 2023-09-24
  # libmpv whose FFmpeg build cannot decode TrueHD (TrueHD 5.1 movies play with
  # NO sound — verified the bundled DLL fails `Opening decoder truehd` at
  # runtime). Vendored fork repoints the CMake download to a maintained
  # full-FFmpeg libmpv (zhongfly/mpv-winbuild) that decodes TrueHD; see
  # third_party/media_kit_libs_windows_video/windows/CMakeLists.txt. Same DLL
  # also backs the audiobook player, so this fixes TrueHD audiobooks too.
  media_kit_libs_windows_video:
    path: ../third_party/media_kit_libs_windows_video
  # BUG-073 (cont.): the SAME TrueHD gap exists on macOS/iOS/Android — media-kit's
  # "default" FFmpeg flavor enables the truehd demuxer but not its decoder, so
  # TrueHD audio is silent on every platform, not just Windows. These forks switch
  # each platform to media-kit's own "full" flavor (which enables all decoders):
  # darwin v0.7.0 -video-full (macOS/iOS) and android v1.1.11 full-*.jar. Linux
  # uses the system libmpv (full FFmpeg) and needs no override. See each package's
  # Makefile / build.gradle for the per-platform repoint + checksums.
  media_kit_libs_macos_video:
    path: ../third_party/media_kit_libs_macos_video
  media_kit_libs_ios_video:
    path: ../third_party/media_kit_libs_ios_video
  media_kit_libs_android_video:
    path: ../third_party/media_kit_libs_android_video
  # BUG-235: media_kit_video 2.0.1's MaterialDesktopSeekBarState.onPointerUp /
  # onPointerMove call controller(context) (dereferences State.context) with no
  # mounted guard. Hibiki tears down the controls subtree on fullscreen
  # enter/exit and episode switch (VideoControlsFocusGate), so releasing the
  # seek bar drag right then crashes with "Null check operator used on a null
  # value". Vendored fork adds `if (!mounted) return;` to both handlers. See
  # third_party/media_kit_video/PATCHES.md.
  media_kit_video:
    path: ../third_party/media_kit_video

