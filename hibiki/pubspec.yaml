  # 替代崩溃的第三方预编译 ffmpeg-kit 变体（其 libffmpegkit_abidetect.so 在
  # Android 16/API 36 上 JNI_OnLoad 返回非法版本，启动即崩，BUG-122）。vendored 包见
  # dependency_overrides 的 ffmpeg_kit_flutter（android 用 third_party 自编 AAR）。
