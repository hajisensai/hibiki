<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="760" viewBox="0 0 1260 760">
  <rect width="1260" height="760" fill="#f6f7f4"/>
  <text x="48" y="54" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#172126">Home and Navigation</text>
  <text x="48" y="84" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#58666d">MD3 structure, Cupertino motion and chrome. Pick one direction for the app shell.</text>

  <g transform="translate(48 120)">
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">A. Quiet MD3</text>
    <text x="0" y="24" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Best default for Android. Stable top actions, clear bottom destinations.</text>
    <rect x="0" y="48" width="340" height="560" rx="28" fill="#11181c"/>
    <rect x="14" y="62" width="312" height="532" rx="22" fill="#fbfcf7"/>
    <rect x="34" y="86" width="272" height="52" rx="8" fill="#fbfcf7"/>
    <circle cx="58" cy="112" r="16" fill="#214f5f"/>
    <text x="84" y="112" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">Hibiki</text>
    <text x="84" y="130" font-family="Inter, Segoe UI, sans-serif" font-size="10" fill="#728087">0.3.0</text>
    <circle cx="256" cy="112" r="18" fill="#e7f0ef"/>
    <text x="250" y="118" font-family="Inter, Segoe UI Symbol, sans-serif" font-size="18" fill="#214f5f">+</text>
    <circle cx="296" cy="112" r="18" fill="#edf1f1"/>
    <text x="290" y="118" font-family="Inter, Segoe UI Symbol, sans-serif" font-size="16" fill="#214f5f">...</text>
    <rect x="34" y="156" width="272" height="40" rx="20" fill="#ebf2f1"/>
    <text x="58" y="181" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#58666d">Filter books, dictionaries, settings</text>
    <rect x="34" y="220" width="122" height="170" rx="8" fill="#d7e5e5"/>
    <rect x="166" y="220" width="122" height="170" rx="8" fill="#efe2cf"/>
    <rect x="34" y="404" width="122" height="118" rx="8" fill="#e4e8ef"/>
    <rect x="166" y="404" width="122" height="118" rx="8" fill="#e7dded"/>
    <rect x="14" y="520" width="312" height="74" rx="0" fill="#fbfcf7"/>
    <rect x="42" y="532" width="64" height="34" rx="17" fill="#d6e9e7"/>
    <text x="58" y="585" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#214f5f">Books</text>
    <text x="148" y="585" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#66747c">Dict</text>
    <text x="236" y="585" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#66747c">Tune</text>
    <circle cx="74" cy="548" r="5" fill="#214f5f"/>
    <circle cx="160" cy="548" r="5" fill="#66747c"/>
    <circle cx="250" cy="548" r="5" fill="#66747c"/>
  </g>

  <g transform="translate(460 120)">
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">B. Cupertino Calm</text>
    <text x="0" y="24" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Best for reading feel. Larger titles, lighter chrome, fewer visible borders.</text>
    <rect x="0" y="48" width="340" height="560" rx="28" fill="#11181c"/>
    <rect x="14" y="62" width="312" height="532" rx="22" fill="#f7f8fb"/>
    <text x="34" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#101820">Books</text>
    <circle cx="278" cy="106" r="18" fill="#ffffff" stroke="#e4e7ea"/>
    <text x="272" y="112" font-family="Inter, Segoe UI Symbol, sans-serif" font-size="18" fill="#2b5b68">+</text>
    <rect x="34" y="142" width="272" height="42" rx="21" fill="#ffffff" stroke="#e4e7ea"/>
    <text x="58" y="168" font-family="Inter, Segoe UI, sans-serif" font-size="13" fill="#768189">Search Library</text>
    <rect x="34" y="214" width="272" height="72" rx="8" fill="#ffffff" stroke="#e2e6e8"/>
    <rect x="50" y="228" width="48" height="44" rx="6" fill="#b8d6d5"/>
    <text x="112" y="248" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#172126">Kagami no Kojo</text>
    <text x="112" y="268" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">82 percent, audiobook ready</text>
    <rect x="34" y="298" width="272" height="72" rx="8" fill="#ffffff" stroke="#e2e6e8"/>
    <rect x="50" y="312" width="48" height="44" rx="6" fill="#e8cfaa"/>
    <text x="112" y="332" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#172126">Japanese Essays</text>
    <text x="112" y="352" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">23 percent, 4 tags</text>
    <rect x="30" y="512" width="280" height="58" rx="22" fill="#ffffff" fill-opacity="0.9" stroke="#dfe5e7"/>
    <rect x="44" y="522" width="76" height="38" rx="19" fill="#e1eeee"/>
    <text x="62" y="546" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#214f5f">Books</text>
    <text x="146" y="546" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Search</text>
    <text x="232" y="546" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Settings</text>
  </g>

  <g transform="translate(872 120)">
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">C. Adaptive Workspace</text>
    <text x="0" y="24" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Best for desktop/tablet. Rail expands to sidebar; mobile still uses tabs.</text>
    <rect x="0" y="48" width="340" height="560" rx="16" fill="#f9faf8" stroke="#dfe5e1"/>
    <rect x="0" y="48" width="78" height="560" rx="16" fill="#eef4f1"/>
    <circle cx="39" cy="92" r="17" fill="#214f5f"/>
    <rect x="18" y="142" width="42" height="46" rx="8" fill="#d5e9e6"/>
    <circle cx="39" cy="158" r="5" fill="#214f5f"/>
    <text x="22" y="181" font-family="Inter, Segoe UI, sans-serif" font-size="9" fill="#214f5f">Books</text>
    <circle cx="39" cy="230" r="5" fill="#66747c"/>
    <text x="22" y="253" font-family="Inter, Segoe UI, sans-serif" font-size="9" fill="#66747c">Dict</text>
    <circle cx="39" cy="302" r="5" fill="#66747c"/>
    <text x="18" y="325" font-family="Inter, Segoe UI, sans-serif" font-size="9" fill="#66747c">Settings</text>
    <text x="112" y="100" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#172126">Library</text>
    <rect x="112" y="124" width="184" height="36" rx="18" fill="#ffffff" stroke="#dfe5e1"/>
    <text x="134" y="147" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Search and filter</text>
    <rect x="112" y="188" width="88" height="134" rx="8" fill="#d3e4e3"/>
    <rect x="214" y="188" width="88" height="134" rx="8" fill="#f0dec6"/>
    <rect x="112" y="342" width="184" height="56" rx="8" fill="#ffffff" stroke="#dfe5e1"/>
    <text x="130" y="365" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#172126">Continue reading</text>
    <text x="130" y="383" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#66747c">Keep tab state per destination</text>
  </g>
</svg>
