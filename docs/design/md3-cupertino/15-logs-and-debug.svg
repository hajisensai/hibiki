<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="760" viewBox="0 0 1260 760">
  <rect width="1260" height="760" fill="#f6f7f4"/>
  <text x="48" y="54" font-family="Inter, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#172126">Logs and Debug</text>
  <text x="48" y="84" font-family="Inter, Segoe UI, sans-serif" font-size="14" fill="#58666d">Covers debug log, error log, loading, diagnostics, low-memory and import status messages.</text>

  <g transform="translate(48 122)">
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">A. Plain Log Viewer</text>
    <text x="0" y="24" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">No theatre: filter, copy, clear, readable monospace output.</text>
    <rect x="0" y="48" width="340" height="560" rx="28" fill="#11181c"/>
    <rect x="14" y="62" width="312" height="532" rx="22" fill="#fbfcf7"/>
    <text x="34" y="108" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#172126">Debug Log</text>
    <rect x="34" y="136" width="272" height="36" rx="18" fill="#edf3f1"/>
    <text x="56" y="159" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Filter logs</text>
    <rect x="34" y="196" width="272" height="300" rx="8" fill="#172126"/>
    <text x="54" y="230" font-family="Consolas, monospace" font-size="11" fill="#d8f2e6">12:44 import start</text>
    <text x="54" y="256" font-family="Consolas, monospace" font-size="11" fill="#d8f2e6">12:45 reader ready</text>
    <text x="54" y="282" font-family="Consolas, monospace" font-size="11" fill="#f0d7aa">12:45 warning cache miss</text>
    <text x="54" y="308" font-family="Consolas, monospace" font-size="11" fill="#d8f2e6">12:45 lookup done</text>
    <rect x="34" y="516" width="126" height="36" rx="18" fill="#ffffff" stroke="#dfe5e1"/>
    <text x="82" y="539" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#214f5f">Copy</text>
    <rect x="180" y="516" width="126" height="36" rx="18" fill="#fff4f1" stroke="#f0d2ca"/>
    <text x="226" y="539" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#9a3d2f">Clear</text>
  </g>

  <g transform="translate(460 122)">
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">B. Error Inbox</text>
    <text x="0" y="24" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Errors are cards with cause, impact, action, and copy stack button.</text>
    <rect x="0" y="48" width="340" height="560" rx="28" fill="#11181c"/>
    <rect x="14" y="62" width="312" height="532" rx="22" fill="#f8fafb"/>
    <text x="34" y="118" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#101820">Errors</text>
    <rect x="34" y="150" width="272" height="132" rx="8" fill="#fff4f1" stroke="#f0d2ca"/>
    <text x="54" y="182" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#9a3d2f">Renderer process gone</text>
    <text x="54" y="206" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#6c6258">Reader WebView restarted.</text>
    <rect x="54" y="232" width="88" height="28" rx="14" fill="#ffffff" stroke="#f0d2ca"/>
    <text x="76" y="251" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#9a3d2f">Copy stack</text>
    <rect x="34" y="306" width="272" height="92" rx="8" fill="#ffffff" stroke="#e1e5e8"/>
    <text x="54" y="338" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#172126">Dictionary import note</text>
    <text x="54" y="362" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Non-fatal skipped resource.</text>
  </g>

  <g transform="translate(872 122)">
    <text x="0" y="0" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#172126">C. Diagnostics Split</text>
    <text x="0" y="24" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">For wide screens: timeline, details, environment state.</text>
    <rect x="0" y="48" width="340" height="560" rx="16" fill="#f9faf8" stroke="#dfe5e1"/>
    <rect x="24" y="84" width="292" height="44" rx="8" fill="#ffffff" stroke="#dfe5e1"/>
    <text x="42" y="112" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#172126">Diagnostics</text>
    <rect x="24" y="150" width="128" height="330" rx="8" fill="#ffffff" stroke="#dfe5e1"/>
    <rect x="164" y="150" width="152" height="330" rx="8" fill="#172126"/>
    <text x="42" y="184" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#66747c">Timeline</text>
    <circle cx="48" cy="220" r="5" fill="#214f5f"/>
    <text x="64" y="225" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#172126">Reader ready</text>
    <circle cx="48" cy="258" r="5" fill="#a9792b"/>
    <text x="64" y="263" font-family="Inter, Segoe UI, sans-serif" font-size="11" fill="#172126">Cache miss</text>
    <text x="184" y="186" font-family="Consolas, monospace" font-size="11" fill="#d8f2e6">device: emulator</text>
    <text x="184" y="214" font-family="Consolas, monospace" font-size="11" fill="#d8f2e6">abi: x86_64</text>
    <text x="184" y="242" font-family="Consolas, monospace" font-size="11" fill="#d8f2e6">webview: ok</text>
  </g>
</svg>
